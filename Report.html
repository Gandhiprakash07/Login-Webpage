<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#081b29;
    color:white;
}

header{
    background:linear-gradient(90deg,#00ffff,#ff00ff);
    padding:20px;
    text-align:center;
    font-size:35px;
    font-weight:bold;
}

.table-box{
    padding:40px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,0.08);
    border-radius:15px;
    overflow:hidden;
}

th,td{
    padding:20px;
    text-align:center;
}

th{
    background:cyan;
    color:black;
}

tr:nth-child(even){
    background:rgba(255,255,255,0.05);
}

tr:hover{
    background:rgba(0,255,255,0.2);
}

</style>
</head>
<body>

<header>📈 Reports</header>

<div class="table-box">

<table>

<tr>
<th>Name</th>
<th>Course</th>
<th>Marks</th>
<th>Status</th>
</tr>

<tr>
<td>Gokul</td>
<td>Java</td>
<td>95</td>
<td>Pass</td>
</tr>

<tr>
<td>Gandhi</td>
<td>Python</td>
<td>88</td>
<td>Pass</td>
</tr>

<tr>
<td>Balaji</td>
<td>Web Dev</td>
<td>78</td>
<td>Pass</td>
</tr>

</table>

</div>

</body>
</html>
