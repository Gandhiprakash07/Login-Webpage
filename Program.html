<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>High Tech Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            background:#050816;
            overflow:hidden;
            color:white;
        }

        /* Animated Background */

        body::before{
            content:"";
            position:fixed;
            width:100%;
            height:100%;

            background:
            radial-gradient(circle at top left, #00ffff33, transparent 40%),
            radial-gradient(circle at bottom right, #ff00ff33, transparent 40%);

            animation:bgMove 6s infinite alternate;
            z-index:-1;
        }

        @keyframes bgMove{

            from{
                transform:scale(1);
            }

            to{
                transform:scale(1.1);
            }
        }

        /* Dashboard Layout */

        .dashboard{
            display:grid;

            grid-template-columns:260px 1fr;

            grid-template-rows:80px 1fr;

            grid-template-areas:
            "header header"
            "sidebar main";

            height:100vh;
        }

        /* Header */

        .header{
            grid-area:header;

            display:flex;
            justify-content:space-between;
            align-items:center;

            padding:0 30px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(15px);

            border-bottom:1px solid rgba(255,255,255,0.1);

            box-shadow:0 0 20px rgba(0,255,255,0.2);
        }

        .header h1{
            font-size:32px;

            color:cyan;

            text-shadow:
            0 0 10px cyan,
            0 0 20px cyan;
        }

        .admin{
            background:rgba(255,255,255,0.1);

            padding:10px 20px;

            border-radius:12px;

            border:1px solid rgba(255,255,255,0.2);

            cursor:pointer;

            transition:0.4s;
        }

        .admin:hover{
            background:cyan;
            color:black;

            box-shadow:
            0 0 15px cyan,
            0 0 30px cyan;
        }

        /* Sidebar */

        .sidebar{
            grid-area:sidebar;

            background:rgba(255,255,255,0.05);

            backdrop-filter:blur(15px);

            border-right:1px solid rgba(255,255,255,0.1);

            padding:30px 20px;
        }

        .sidebar h2{
            margin-bottom:30px;

            color:cyan;

            text-shadow:0 0 10px cyan;
        }

        .sidebar ul{
            list-style:none;
        }

        .sidebar ul li{

            margin:20px 0;

            padding:15px;

            border-radius:12px;

            background:rgba(255,255,255,0.06);

            transition:0.4s;

            cursor:pointer;
        }

        .sidebar ul li:hover{

            transform:translateX(10px);

            background:cyan;

            color:black;

            box-shadow:
            0 0 15px cyan,
            0 0 30px cyan;
        }

        /* Main Content */

        .main{
            grid-area:main;

            padding:30px;

            overflow:auto;
        }

        /* Cards */

        .cards{
            display:grid;

            grid-template-columns:repeat(auto-fit, minmax(220px,1fr));

            gap:25px;

            margin-bottom:30px;
        }

        .card{

            background:rgba(255,255,255,0.08);

            border:1px solid rgba(255,255,255,0.1);

            border-radius:20px;

            padding:25px;

            backdrop-filter:blur(10px);

            transition:0.4s;

            box-shadow:
            0 0 15px rgba(0,255,255,0.1);
        }

        .card:hover{

            transform:translateY(-10px);

            box-shadow:
            0 0 20px cyan,
            0 0 40px cyan;
        }

        .card h3{
            margin-bottom:15px;
            color:#00ffff;
        }

        .card p{
            font-size:35px;
            font-weight:bold;
        }

        /* Chart Box */

        .chart-box{

            background:rgba(255,255,255,0.08);

            border-radius:20px;

            padding:30px;

            backdrop-filter:blur(10px);

            border:1px solid rgba(255,255,255,0.1);

            box-shadow:
            0 0 15px rgba(255,0,255,0.2);
        }

        .chart-box h2{
            margin-bottom:30px;

            color:#ff00ff;

            text-shadow:
            0 0 10px #ff00ff;
        }

        /* Chart */

        .chart{
            height:300px;

            display:flex;
            align-items:flex-end;
            justify-content:space-between;

            gap:15px;
        }

        .bar{

            width:50px;

            border-radius:12px 12px 0 0;

            background:linear-gradient(to top, cyan, #ff00ff);

            animation:bars 2s infinite alternate;

            box-shadow:
            0 0 15px cyan;
        }

        @keyframes bars{

            from{
                opacity:0.7;
            }

            to{
                opacity:1;
            }
        }

        .bar1{height:80%;}
        .bar2{height:60%;}
        .bar3{height:95%;}
        .bar4{height:50%;}
        .bar5{height:70%;}
        .bar6{height:40%;}
        .bar7{height:85%;}

        /* Months */

        .months{

            display:flex;
            justify-content:space-between;

            margin-top:15px;

            color:#ddd;
        }

        /* Responsive */

        @media(max-width:900px){

            .dashboard{
                grid-template-columns:1fr;
                grid-template-rows:80px auto 1fr;

                grid-template-areas:
                "header"
                "sidebar"
                "main";
            }

            .sidebar{
                display:flex;
                flex-direction:column;
                align-items:center;
            }

            .sidebar ul{
                width:100%;
            }
        }

    </style>

</head>

<body>

    <div class="dashboard">

        <!-- HEADER -->

        <div class="header">

            <h1>⚡Dashboard</h1>

            <div class="admin">
                Gandhi ▼
            </div>

        </div>

        <!-- SIDEBAR -->

        <div class="sidebar">

            <h2>MENU</h2>

            <ul>

                <li onclick="window.location.href='Overview.html'">
                    📊 Overview
                </li>

                <li onclick="window.location.href='Stuprofile.html'">
                    🎓 Students
                </li>

                <li onclick="window.location.href='Course.html'">
                    📚 Courses
                </li>

                <li onclick="window.location.href='Report.html'">
                    📈 Reports
                </li>

                <li onclick="window.location.href='Settings.html'">
                    ⚙ Settings
                </li>

            </ul>

        </div>

        <!-- MAIN CONTENT -->

        <div class="main">

            <!-- CARDS -->

            <div class="cards">

                <div class="card">
                    <h3>Total Students</h3>
                    <p>248</p>
                </div>

                <div class="card">
                    <h3>Total Courses</h3>
                    <p>12</p>
                </div>

                <div class="card">
                    <h3>Pass Rate</h3>
                    <p>94%</p>
                </div>

                <div class="card">
                    <h3>Attendance</h3>
                    <p>88%</p>
                </div>

            </div>

            <!-- CHART -->

            <div class="chart-box">

                <h2>📈 Performance Chart</h2>

                <div class="chart">

                    <div class="bar bar1"></div>
                    <div class="bar bar2"></div>
                    <div class="bar bar3"></div>
                    <div class="bar bar4"></div>
                    <div class="bar bar5"></div>
                    <div class="bar bar6"></div>
                    <div class="bar bar7"></div>

                </div>

                <div class="months">

                    <span>Jan</span>
                    <span>Feb</span>
                    <span>Mar</span>
                    <span>Apr</span>
                    <span>May</span>
                    <span>Jun</span>
                    <span>Jul</span>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
