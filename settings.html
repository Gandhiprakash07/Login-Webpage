<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

header{
    background:linear-gradient(90deg,#00ff99,#00ccff);
    padding:20px;
    text-align:center;
    font-size:35px;
    font-weight:bold;
}

.settings-box{
    width:400px;
    margin:50px auto;
    background:rgba(255,255,255,0.08);
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,255,255,0.3);
}

.settings-box label{
    display:block;
    margin-top:20px;
    margin-bottom:10px;
}

.settings-box input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
}

button{
    margin-top:25px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:cyan;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:white;
}

</style>
</head>
<body>

<header>⚙ Settings</header>

<div class="settings-box">

<label>Username</label>
<input type="text" placeholder="Enter username">

<label>Email</label>
<input type="email" placeholder="Enter email">

<label>Password</label>
<input type="password" placeholder="Enter password">

<button>Save Settings</button>

</div>

</body>
</html>
