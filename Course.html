<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courses</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#111827;
    color:white;
}

header{
    background:linear-gradient(90deg,#ff00cc,#3333ff);
    padding:20px;
    text-align:center;
    font-size:35px;
    font-weight:bold;
}

.course-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:40px;
}

.course{
    background:#1f2937;
    border-radius:20px;
    padding:25px;
    transition:0.4s;
    box-shadow:0 0 15px rgba(255,0,255,0.3);
}

.course:hover{
    transform:translateY(-10px);
    box-shadow:0 0 25px magenta;
}

.course h2{
    color:#00ffff;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:cyan;
    font-weight:bold;
    cursor:pointer;
}

</style>
</head>
<body>

<header>📚 Courses</header>

<div class="course-container">

<div class="course">
<h2>Web Development</h2>
<p>HTML, CSS, JavaScript Full Course</p>
<button>Enroll</button>
</div>

<div class="course">
<h2>Java Programming</h2>
<p>Core Java + Advanced Java</p>
<button>Enroll</button>
</div>

<div class="course">
<h2>Python</h2>
<p>Python Basics to AI</p>
<button>Enroll</button>
</div>

<div class="course">
<h2>UI/UX Design</h2>
<p>Modern Designing Course</p>
<button>Enroll</button>
</div>

</div>

</body>
</html>
