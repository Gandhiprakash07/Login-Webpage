<!DOCTYPE html>
<html>
<head>
  <title>Google Style Page</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      font-family:Arial;
      overflow:hidden;
    }

    video{
      position:fixed;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-1;
    }

    h1{
      font-size:70px;
      background:linear-gradient(to right, red, yellow, cyan, pink);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .search{
      width:400px;
      padding:15px;
      border:none;
      border-radius:30px;
      font-size:18px;
      outline:none;
      background:rgba(255,255,255,0.2);
      color:white;
      backdrop-filter:blur(5px);
    }

    button{
      margin-top:20px;
      padding:12px 25px;
      border:none;
      border-radius:25px;
      font-size:18px;
      color:white;
      background:linear-gradient(to right, blue, purple, pink);
      cursor:pointer;
    }

    button:hover{
      transform:scale(1.1);
    }

    a{
      color:white;
      text-decoration:none;
      font-size:20px;
    }

    a:hover{
      color:yellow;
    }

  </style>
</head>

<body>

  <a href="https://google.com">Original Google</a><br>
  <a href="https://linkedin.com">LinkedIn</a><br>
  <a href="https://youtube.com">YouTube</a><br>

  <!-- Video with Audio -->
  <video autoplay loop controls id="bgvideo">
    <source src="Video2.mp4" type="video/mp4">
  </video>

  <h1>Google</h1>

  <form action="https://www.google.com/search"
        method="GET"
        target="_blank">

    <input
      type="text"
      class="search"
      name="q"
      placeholder="Search Here...">

    <br><center>
      <button type="submit">Search</button>
    </center>

  </form>

</body>
</html>
