<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>3D Rotating Card Marquee</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            height:100vh;
            overflow:hidden;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#000;
        }

        /* Background Video */

        .bg-video{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            object-fit:cover;
            z-index:-2;
        }

        /* Overlay */

        .overlay{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.55);
            z-index:-1;
        }

        /* Title */

        h1{
            position:absolute;
            top:30px;
            color:white;
            font-size:55px;
            letter-spacing:4px;
            text-transform:uppercase;

            text-shadow:
            0 0 10px #ff0080,
            0 0 20px #ff0080,
            0 0 40px #ff0080;
        }

        /* 3D Scene */

        .scene{
            width:300px;
            height:400px;
            perspective:1200px;
        }

        /* Carousel */

        .carousel{
            width:100%;
            height:100%;
            position:relative;
            transform-style:preserve-3d;
            animation:rotate 20s infinite linear;
        }

        .carousel:hover{
            animation-play-state:paused;
        }

        @keyframes rotate{
            from{
                transform:rotateY(0deg);
            }

            to{
                transform:rotateY(360deg);
            }
        }

        /* Cards */

        .card{
            position:absolute;

            width:260px;
            height:360px;

            left:20px;
            top:20px;

            border-radius:20px;

            overflow:hidden;

            cursor:pointer;

            background:rgba(255,255,255,0.08);

            border:1px solid rgba(255,255,255,0.2);

            backdrop-filter:blur(10px);

            box-shadow:
            0 0 20px rgba(255,0,128,0.4);

            transition:0.5s;
        }

        .card:hover{
            transform:scale(1.05);

            box-shadow:
            0 0 25px cyan,
            0 0 50px cyan;
        }

        .card img{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .card-content{
            padding:20px;
            color:white;
            text-align:center;
        }

        .card-content h2{
            margin-bottom:10px;

            color:#ff4da6;

            text-shadow:
            0 0 10px #ff4da6;
        }

        .card-content p{
            font-size:14px;
            color:#ddd;
        }

        /* Card Positions */

        .card:nth-child(1){
            transform:rotateY(0deg) translateZ(450px);
        }

        .card:nth-child(2){
            transform:rotateY(51deg) translateZ(450px);
        }

        .card:nth-child(3){
            transform:rotateY(102deg) translateZ(450px);
        }

        .card:nth-child(4){
            transform:rotateY(153deg) translateZ(450px);
        }

        .card:nth-child(5){
            transform:rotateY(204deg) translateZ(450px);
        }

        .card:nth-child(6){
            transform:rotateY(255deg) translateZ(450px);
        }

        .card:nth-child(7){
            transform:rotateY(306deg) translateZ(450px);
        }

        /* Responsive */

        @media(max-width:768px){

            h1{
                font-size:35px;
            }

            .scene{
                transform:scale(0.75);
            }
        }

    </style>

</head>

<body>

    <!-- Background Video -->

    <video autoplay muted loop class="bg-video">
        <source src="assets/eye.mp4" type="video/mp4">
    </video>

    <!-- Overlay -->

    <div class="overlay"></div>

    <!-- Title -->

    <h1>My Website</h1>

    <!-- 3D Scene -->

    <div class="scene">

        <div class="carousel">

            <!-- CARD 1 -->

            <div class="card"
            onclick="window.location.href='pages/Task5.html'">

                <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop">

                <div class="card-content">

                    <h2>📊 Table</h2>

                    <p>View all table tasks and records.</p>

                </div>

            </div>

            <!-- CARD 2 -->

            <div class="card"
            onclick="window.location.href='pages/Homework.html'">

                <img src="https://images.unsplash.com/photo-1455390582262-044cdead277a?q=80&w=1200&auto=format&fit=crop">

                <div class="card-content">

                    <h2>📘 Homework</h2>

                    <p>Check your homework activities.</p>

                </div>

            </div>

            <!-- CARD 3 -->

            <div class="card"
            onclick="window.location.href='index.html'">

                <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200&auto=format&fit=crop">

                <div class="card-content">

                    <h2>🏠 Index</h2>

                    <p>Main index page of the website.</p>

                </div>

            </div>

            <!-- CARD 4 -->

            <div class="card"
            onclick="window.location.href='pages/Task3.html'">

                <img src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4?q=80&w=1200&auto=format&fit=crop">

                <div class="card-content">

                    <h2>💻 Task 3</h2>

                    <p>Open Task 3 project page.</p>

                </div>

            </div>

            <!-- CARD 5 -->

            <div class="card"
            onclick="window.location.href='pages/Task4.html'">

                <img src="https://images.unsplash.com/photo-1504639725590-34d0984388bd?q=80&w=1200&auto=format&fit=crop">

                <div class="card-content">

                    <h2>🚀 Task 4</h2>

                    <p>View the Task 4 design page.</p>

                </div>

            </div>

            <!-- CARD 6 -->

            <div class="card"
            onclick="window.location.href='pages/Live.html'">

                <img src="https://images.unsplash.com/photo-1526379095098-d400fd0bf935?q=80&w=1200&auto=format&fit=crop">

                <div class="card-content">

                    <h2>🔴 Live</h2>

                    <p>Open the live streaming page.</p>

                </div>

            </div>

            <!-- CARD 7 -->

            <div class="card"
            onclick="window.location.href='pages/Program.html'">

                <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80&w=1200&auto=format&fit=crop">

                <div class="card-content">

                    <h2>⚡ Program</h2>

                    <p>Check programming exercises.</p>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
