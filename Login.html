<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>High Tech Login Page</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins', sans-serif;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            background:#000;
        }

        /* Background Video */

        .bg-video{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            object-fit:cover;
            z-index:-2;
        }

        /* Dark Overlay */

        .overlay{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.6);
            z-index:-1;
        }

        /* Login Box */

        .login-box{
            width:380px;
            padding:40px;

            background:rgba(255,255,255,0.08);

            border:1px solid rgba(255,255,255,0.2);

            border-radius:25px;

            backdrop-filter:blur(15px);

            box-shadow:
            0 0 20px rgba(0,255,255,0.3),
            0 0 40px rgba(0,255,255,0.2);

            text-align:center;

            animation:glow 3s infinite alternate;
        }

        @keyframes glow{

            from{
                box-shadow:
                0 0 20px cyan,
                0 0 40px cyan;
            }

            to{
                box-shadow:
                0 0 30px #00ffff,
                0 0 60px #00ffff;
            }
        }

        .login-box h1{
            color:white;
            margin-bottom:30px;
            font-size:40px;
            letter-spacing:2px;

            text-shadow:
            0 0 10px cyan,
            0 0 20px cyan;
        }

        /* Input Box */

        .input-box{
            position:relative;
            margin-bottom:25px;
        }

        .input-box input{
            width:100%;
            padding:15px;

            background:rgba(255,255,255,0.08);

            border:1px solid rgba(255,255,255,0.2);

            outline:none;

            border-radius:12px;

            color:white;
            font-size:16px;

            transition:0.4s;
        }

        .input-box input:focus{
            border-color:cyan;

            box-shadow:
            0 0 10px cyan,
            0 0 20px cyan;
        }

        .input-box input::placeholder{
            color:#ddd;
        }

        /* Button */

        .btn{
            width:100%;
            padding:15px;

            border:none;
            border-radius:12px;

            background:cyan;

            color:black;
            font-size:18px;
            font-weight:600;

            cursor:pointer;

            transition:0.4s;
        }

        .btn:hover{
            transform:scale(1.05);

            box-shadow:
            0 0 15px cyan,
            0 0 30px cyan,
            0 0 60px cyan;
        }

        /* Links */

        .links{
            margin-top:20px;

            display:flex;
            justify-content:space-between;
        }

        .links a{
            color:white;
            text-decoration:none;
            font-size:14px;

            transition:0.3s;
        }

        .links a:hover{
            color:cyan;
            text-shadow:0 0 10px cyan;
        }

        /* Responsive */

        @media(max-width:450px){

            .login-box{
                width:90%;
                padding:30px;
            }

            .login-box h1{
                font-size:30px;
            }
        }

    </style>

</head>

<body>

    <!-- Background Video -->

    <video autoplay muted loop class="bg-video">
        <source src="Video.mp4" type="video/mp4">
    </video>

    <!-- Overlay -->

    <div class="overlay"></div>

    <!-- Login Form -->

    <div class="login-box">

        <h1>LOGIN</h1>

        <!-- LOGIN REDIRECT -->

        <form action="file:///D:/For%20Test/Program.html">

            <div class="input-box">
                <input type="text" placeholder="Enter Username" required>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Enter Password" required>
            </div>

            <button type="submit" class="btn">
                Login
            </button>

            <div class="links">
                <a href="file:///D:/For%20Test/Register.html">Sign Up</a>
                <a href="file:///D:/For%20Test/Forgot.html">Forgot Password?</a>
            </div>

        </form>

    </div>

</body>
</html>
