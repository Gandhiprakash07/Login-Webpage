<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Tech Navigation</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: 'Poppins', sans-serif;
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            overflow:hidden;
            position:relative;
        }

        /* Background Video */

        .bg-video{
            position:fixed;
            top:0;
            left:0;

            width:100%;
            height:100%;

            object-fit:cover;

            z-index:-2;
        }

        /* Dark Overlay */

        .overlay{
            position:fixed;
            top:0;
            left:0;

            width:100%;
            height:100%;

            background:rgba(0,0,0,0.5);

            z-index:-1;
        }

        /* Glass Container */

        .container{
            width:90%;
            max-width:1100px;
            padding:40px;

            background: rgba(255,255,255,0.08);

            border:1px solid rgba(255,255,255,0.2);

            border-radius:25px;

            backdrop-filter: blur(15px);

            box-shadow:
            0 0 20px rgba(32, 139, 139, 0.3),
            0 0 40px rgba(0,255,255,0.2);

            text-align:center;
        }

        h1{
            color:white;
            font-size:55px;
            margin-bottom:40px;
            letter-spacing:3px;
            text-transform:uppercase;

            text-shadow:
            0 0 10px cyan,
            0 0 20px cyan,
            0 0 40px cyan;
        }

        nav ul{
            list-style:none;

            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            gap:25px;
        }

        nav ul li a{

            position:relative;

            display:inline-block;

            padding:15px 30px;

            color:white;
            text-decoration:none;
            font-size:18px;
            font-weight:600;

            border-radius:15px;

            background: rgba(255,255,255,0.08);

            border:1px solid rgba(255,255,255,0.15);

            overflow:hidden;

            transition:0.4s ease;

            box-shadow:
            0 0 10px rgba(0,255,255,0.2);
        }

        /* Neon Hover Effect */

        nav ul li a:hover{

            transform:translateY(-5px) scale(1.05);

            color:#000;

            background:cyan;

            box-shadow:
            0 0 15px cyan,
            0 0 30px cyan,
            0 0 60px cyan;
        }

        /* Shine Animation */

        nav ul li a::before{
            content:"";

            position:absolute;

            top:0;
            left:-100%;

            width:100%;
            height:100%;

            background:linear-gradient(
                120deg,
                transparent,
                rgba(255,255,255,0.6),
                transparent
            );

            transition:0.6s;
        }

        nav ul li a:hover::before{
            left:100%;
        }

        /* Responsive */

        @media(max-width:768px){

            h1{
                font-size:38px;
            }

            nav ul{
                gap:15px;
            }

            nav ul li a{
                padding:12px 20px;
                font-size:16px;
            }
        }

    </style>
</head>

<body>

    <!-- Background Video -->
    <video autoplay muted loop class="bg-video">
        <source src="Video.mp4" type="video/mp4">
    </video>

    <!-- Overlay -->
    <div class="overlay"></div>

    <div class="container">

        <h1>My Website</h1>

        <nav>
            <ul>

                <li><a href="file:///D:/For%20Test/Task 5.html">Table</a></li>
                <li><a href="file:///D:/For%20Test/Homework.html">Homework</a></li>
                <li><a href="file:///D:/For%20Test/index.html">Index</a></li>
                <li><a href="file:///D:/For%20Test/Task 3.html">Task 3</a></li>
                <li><a href="file:///D:/For%20Test/Task 4.html">Task 4</a></li>
                <li><a href="file:///D:/For%20Test/Live.html">Live</a></li>
                <li><a href="file:///D:/For%20Test/Program.html">Program</a></li>

            </ul>
        </nav>

    </div>

</body>
</html>
